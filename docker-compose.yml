services:
  backend:
    build:
      context: ./backend
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      CLAWGUARD_SECRET_KEY: "change-me"
      CLAWGUARD_CFL_MODE: "mock"
      CLAWGUARD_DATABASE_URL: "sqlite:///./clawguard.db"
      CLAWGUARD_JOBS_DIR: "./jobs"
      CLAWGUARD_POLICY_PATH: "./policies/security_policy.yaml"
    volumes:
      - ./backend/jobs:/app/jobs
      - /var/run/docker.sock:/var/run/docker.sock
